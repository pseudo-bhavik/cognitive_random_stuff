<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM LOGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; color: #000000; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .border-heavy { border: 4px solid #000; }
        .input-box { border: 2px solid #000; padding: 12px; width: 100%; margin-bottom: 16px; outline: none; font-weight: bold; }
        .input-box:focus { background-color: #f0f0f0; }
        .btn-submit { background-color: #000; color: #fff; padding: 16px; width: 100%; font-weight: 900; letter-spacing: 0.1em; cursor: pointer; text-transform: uppercase; border: none; }
        .btn-submit:hover { background-color: #333; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full border-heavy p-8">
        <h1 class="text-4xl font-black uppercase mb-2">AUTH PORTAL</h1>
        <p class="text-xs font-bold uppercase tracking-widest mb-8 border-b-2 border-black pb-4">Cognitive Load System v2.0</p>
        
        {% if error %}
            <div class="bg-black text-white p-4 font-bold mb-6 text-sm uppercase">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label class="block text-xs font-bold uppercase mb-2">Operator ID</label>
            <input type="text" name="username" class="input-box" required autocomplete="off">
            
            <label class="block text-xs font-bold uppercase mb-2">Passcode</label>
            <input type="password" name="password" class="input-box" required>
            
            <button type="submit" class="btn-submit mt-4">INITIALIZE SESSION</button>
        </form>
    </div>
</body>
</html>
